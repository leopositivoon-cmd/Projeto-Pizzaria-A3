<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Produtos - Pizzaria Vitoriana</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/admin.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container-admin">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">

                <img src="../midia/imagens/logo.png"
                    alt="Logo">

                <h2>
                    Pizzaria Vitoriana
                </h2>

            </div>

            <nav class="menu">

                <a href="admin.html">

                    <i class="bi bi-grid-fill"></i>

                    <span>
                        Dashboard
                    </span>

                </a>

                <a href="pedidos.html">

                    <i class="bi bi-bag-fill"></i>

                    <span>
                        Pedidos
                    </span>

                </a>

                <a href="produtos.html"
                    class="active">

                    <i class="bi bi-box-seam-fill"></i>

                    <span>
                        Produtos
                    </span>

                </a>

                <a href="clientes.html">

                    <i class="bi bi-people-fill"></i>

                    <span>
                        Clientes
                    </span>

                </a>

            </nav>

        </aside>

        <!-- DASHBOARD -->

        <main class="dashboard">

            <!-- TOPO -->

            <div class="top-dashboard">

                <div>

                    <h1>
                        Produtos
                    </h1>

                    <p>
                        Gerencie os produtos da pizzaria
                    </p>

                </div>

            </div>

            <!-- CARD -->

            <div class="cards">

                <div class="card-admin">

                    <div class="card-top">

                        <h3>
                            Total de Produtos
                        </h3>

                        <i class="bi bi-box-seam-fill"></i>

                    </div>

                    <span id="totalProdutos">

                        0

                    </span>

                </div>

            </div>

            <!-- FORMULÁRIO -->

            <div class="tabela">

                <div class="titulo-tabela">

                    <h2>
                        Novo Produto
                    </h2>

                </div>

                <form id="produtoForm"
                    class="form-produto">

                    <input
                        type="text"
                        id="nome"
                        placeholder="Nome do Produto"
                        required>

                    <select
                        id="tipo"
                        required>

                        <option value="">
                            Tipo do Produto
                        </option>

                        <option value="PIZZA">
                            Pizza
                        </option>

                        <option value="BEBIDA">
                            Bebida
                        </option>

                        <option value="BORDA">
                            Borda
                        </option>

                    </select>

                    <input
                        type="number"
                        id="preco"
                        step="0.01"
                        placeholder="Preço"
                        required>

                    <input
                        type="text"
                        id="descricao"
                        placeholder="Descrição">

                    <button
                        type="submit"
                        class="btn-status">

                        Salvar Produto

                    </button>

                </form>

            </div>

            <!-- TABELA -->

            <div class="tabela">

                <div class="titulo-tabela">

                    <h2>
                        Produtos Cadastrados
                    </h2>

                </div>

                <table>

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Nome</th>

                            <th>Tipo</th>

                            <th>Preço</th>

                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="listaProdutos">

                        <tr>

                            <td colspan="5"
                                class="sem-pedidos">

                                Carregando produtos...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <script>

        const API_URL = "http://localhost:8082/produtos";

        const token = localStorage.getItem("token");

        if (!token) {

            window.location.href = "login.html";

        }

        async function carregarProdutos() {

            try {

                const response = await fetch(API_URL, {

                    headers: {
                        Authorization: `Bearer ${token}`
                    }

                });

                const produtos = await response.json();

                document.getElementById(
                    "totalProdutos"
                ).textContent = produtos.length;

                const tbody =
                    document.getElementById("listaProdutos");

                tbody.innerHTML = "";

                if (produtos.length === 0) {

                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="sem-pedidos">
                                Nenhum produto cadastrado.
                            </td>
                        </tr>
                    `;

                    return;

                }

                produtos.forEach(p => {

                    tbody.innerHTML += `
                        <tr>

                            <td>${p.id}</td>

                            <td>${p.nome}</td>

                            <td>${p.tipo}</td>

                            <td>
                                R$ ${Number(p.preco).toFixed(2)}
                            </td>

                            <td>

                                <button
                                    class="btn-status"
                                    onclick="editarProduto(${p.id})">

                                    Editar

                                </button>

                                <button
                                    class="btn-status"
                                    onclick="excluirProduto(${p.id})">

                                    Excluir

                                </button>

                            </td>

                        </tr>
                    `;

                });

            } catch (error) {

                console.error(error);

            }

        }

        document
            .getElementById("produtoForm")
            .addEventListener("submit", async (e) => {

                e.preventDefault();

                const produto = {

                    nome: document.getElementById("nome").value,

                    tipo: document.getElementById("tipo").value,

                    preco: parseFloat(
                        document.getElementById("preco").value
                    ),

                    descricao:
                        document.getElementById("descricao").value

                };

                try {

                    await fetch(API_URL, {

                        method: "POST",

                        headers: {

                            "Content-Type": "application/json",

                            Authorization: `Bearer ${token}`

                        },

                        body: JSON.stringify(produto)

                    });

                    e.target.reset();

                    carregarProdutos();

                } catch (error) {

                    console.error(error);

                }

            });

        async function excluirProduto(id) {

            if (!confirm("Deseja excluir este produto?"))
                return;

            try {

                await fetch(`${API_URL}/${id}`, {

                    method: "DELETE",

                    headers: {

                        Authorization: `Bearer ${token}`

                    }

                });

                carregarProdutos();

            } catch (error) {

                console.error(error);

            }

        }

        function editarProduto(id) {

            alert(
                "Função de edição será implementada futuramente. ID: " + id
            );

        }

        carregarProdutos();

    </script>

</body>

</html>
