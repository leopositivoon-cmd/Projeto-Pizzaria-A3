<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Pedidos - Admin Vitoriana</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/pedidos.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container-admin">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="logo">

                <img src="../midia/imagens/logo.png" alt="Logo">

                <h2>Pizzaria Vitoriana</h2>

            </div>

            <nav class="menu">

                <a href="admin.html">

                    <i class="bi bi-grid-fill"></i>

                    <span>Dashboard</span>

                </a>

                <a href="pedidos.html" class="active">

                    <i class="bi bi-bag-fill"></i>

                    <span>Pedidos</span>

                </a>

                <a href="produtos.html">

                    <i class="bi bi-box-seam-fill"></i>

                    <span>Produtos</span>

                </a>

                <a href="clientes.html">

                    <i class="bi bi-people-fill"></i>

                    <span>Clientes</span>

                </a>

            </nav>

        </aside>

        <!-- CONTEÚDO -->
        <main class="pedidos">

            <div class="top-pedidos">

                <h1>Lista de Pedidos</h1>

                <div class="busca">

                    <i class="bi bi-search"></i>

                    <input
                        type="text"
                        id="buscarPedido"
                        placeholder="Buscar pedido...">

                </div>

            </div>

            <div class="tabela-pedidos">

                <table>

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Cliente</th>

                            <th>Status</th>

                            <th>Total</th>

                            <th>Gerenciar</th>

                        </tr>

                    </thead>

                    <tbody id="listaPedidos">

                        <!--
                            O JavaScript irá gerar linhas no formato:

                            ID | Cliente | Select Status | Total |
                            [Salvar] [Excluir]
                        -->

                    </tbody>

                </table>

                <div
                    id="semPedidos"
                    class="sem-pedidos">

                    Não há pedidos ainda.

                </div>

            </div>

        </main>

    </div>

    <script src="../js/pedidos.js"></script>

</body>

</html>
